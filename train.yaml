experiment: "xai"
seed: 42
data_path: "./data/CUB_200_2011/"
dataset: "CUB"
batch_size: 64
num_workers: 8
trainer: "Joint"
use_adv: True
add_noise: False
model: "CBM"
model_args:
  base: "inceptionv3"
  num_attributes: 112
  num_classes: 200
  attr_loss_weight: 0.01
  use_pretrained: True
optimizer: "SGD"
optimizer_args:
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.0001
scheduler: "StepLR"
scheduler_args:
  step_size: 50
  gamma: 0.1
loss_fn: "CrossEntropyLoss"
attr_loss_fn: "BCEWithLogitsLoss"
epochs: 10000